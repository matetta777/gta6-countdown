<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA VI Countdown</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(-45deg,#ff008c,#ff5e00,#7928ca,#0099ff);
    background-size:400% 400%;
    animation:bg 12s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.container{
    width:90%;
    max-width:1200px;
    text-align:center;
    color:white;
}

.logo{
    font-size:6rem;
    font-weight:900;
    text-shadow:0 0 20px rgba(255,255,255,.4);
    letter-spacing:4px;
}

.subtitle{
    margin-top:10px;
    font-size:1.2rem;
    opacity:.9;
}

.countdown{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin-top:50px;
}

.box{
    min-width:170px;
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.2);
}

.number{
    font-size:4rem;
    font-weight:bold;
}

.label{
    margin-top:10px;
    font-size:1rem;
    text-transform:uppercase;
    letter-spacing:2px;
}

.footer{
    margin-top:40px;
    font-size:1rem;
    opacity:.8;
}

.glow{
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    background:rgba(255,255,255,.08);
    filter:blur(100px);
}

.glow:nth-child(1){
    top:-200px;
    left:-100px;
}

.glow:nth-child(2){
    bottom:-200px;
    right:-100px;
}

@media(max-width:700px){
    .logo{
        font-size:3.5rem;
    }

    .number{
        font-size:2.8rem;
    }

    .box{
        min-width:130px;
    }
}
</style>
</head>
<body>

<div class="glow"></div>
<div class="glow"></div>

<div class="container">

    <div class="logo">GTA VI</div>

    <div class="subtitle">
        Cuenta regresiva para el 19 de noviembre de 2026
    </div>

    <div class="countdown">

        <div class="box">
            <div id="days" class="number">0</div>
            <div class="label">Días</div>
        </div>

        <div class="box">
            <div id="hours" class="number">0</div>
            <div class="label">Horas</div>
        </div>

        <div class="box">
            <div id="minutes" class="number">0</div>
            <div class="label">Minutos</div>
        </div>

        <div class="box">
            <div id="seconds" class="number">0</div>
            <div class="label">Segundos</div>
        </div>

    </div>

    <div class="footer" id="message">
        Faltan...
    </div>

</div>

<script>

const targetDate = new Date("2026-11-19T00:00:00").getTime();

function updateCountdown(){

    const now = new Date().getTime();
    const distance = targetDate - now;

    if(distance <= 0){
        document.getElementById("message").innerHTML =
        "🎉 ¡YA LLEGÓ EL DÍA!";
        return;
    }

    const days = Math.floor(distance / (1000*60*60*24));
    const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((distance % (1000*60)) / 1000);

    document.getElementById("days").innerText = days;
    document.getElementById("hours").innerText = hours;
    document.getElementById("minutes").innerText = minutes;
    document.getElementById("seconds").innerText = seconds;
}

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>
